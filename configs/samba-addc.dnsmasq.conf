# Samba AD DC lab specifics, fed into stage-router-artifacts.sh via
# --extra-dnsmasq. The script inlines this under the write_files block in
# user-data; keep the indentation level of lines that will land in
# /etc/dnsmasq.d/lab.conf (the wrapping is handled by the staging script,
# which prefixes 6 spaces).
#
# This is still a hand-written dnsmasq snippet. The next iteration of
# lab-router will render equivalent content from YAML.

# MAC-based DHCP reservations for the lab's predictable-IP VMs. Hyper-V
# default MAC prefix is 00:15:5D. Pin these MACs on the VMs.
dhcp-host=00:15:5D:0A:0A:0A,WS2025-DC1,10.10.10.10,infinite
dhcp-host=00:15:5D:0A:0A:14,samba-dc1,10.10.10.20,infinite
dhcp-host=00:15:5D:0A:0A:15,samba-dc2,10.10.10.21,infinite
dhcp-host=00:15:5D:0A:0A:16,samba-dc3,10.10.10.22,infinite
dhcp-host=00:15:5D:0A:0A:1E,smbproxy-1,10.10.10.30,infinite

# Delegate lab.test zone to the AD DCs so any LAN client that uses the
# router as DNS resolves AD records correctly. Both DCs listed; dnsmasq
# will try in order and fall back if one is down.
server=/lab.test/10.10.10.10
server=/lab.test/10.10.10.20
